apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-{{ .Values.env }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: myapp
      env: {{ .Values.env }}
  template:
    metadata:
      labels:
        app: myapp
        env: {{ .Values.env }}
    spec:
      containers:
        - name: myapp
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80