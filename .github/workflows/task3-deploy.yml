name: Task3 - Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev or release)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - release
      vm_ip:
        description: 'VM IP address'
        required: true
        default: '207.154.227.207'

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event.inputs.environment }}" == "dev" ]; then
            echo "TAG=develop" >> $GITHUB_OUTPUT
            echo "NAMESPACE=dev" >> $GITHUB_OUTPUT
            echo "NODE_PORT=30082" >> $GITHUB_OUTPUT
            echo "HOST_PORT=8002" >> $GITHUB_OUTPUT
          else
            echo "TAG=1.0.0" >> $GITHUB_OUTPUT
            echo "NAMESPACE=release" >> $GITHUB_OUTPUT
            echo "NODE_PORT=30083" >> $GITHUB_OUTPUT
            echo "HOST_PORT=8003" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          docker build -t ghcr.io/oleksandra-turovets/devops-exam:${{ steps.vars.outputs.TAG }} task3/app/
          docker push ghcr.io/oleksandra-turovets/devops-exam:${{ steps.vars.outputs.TAG }}

  validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Helm lint (перевірка без розгортання)
        run: |
          helm lint task3/helm/myapp \
            --set env=${{ needs.build.outputs.environment }} \
            --set namespace=${{ needs.build.outputs.namespace }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event.inputs.environment }}" == "dev" ]; then
            echo "TAG=develop" >> $GITHUB_OUTPUT
            echo "NAMESPACE=dev" >> $GITHUB_OUTPUT
            echo "NODE_PORT=30082" >> $GITHUB_OUTPUT
            echo "HOST_PORT=8002" >> $GITHUB_OUTPUT
          else
            echo "TAG=1.0.0" >> $GITHUB_OUTPUT
            echo "NAMESPACE=release" >> $GITHUB_OUTPUT
            echo "NODE_PORT=30083" >> $GITHUB_OUTPUT
            echo "HOST_PORT=8003" >> $GITHUB_OUTPUT
          fi

      - name: Start Minikube on VM
        run: |
          ssh root@${{ github.event.inputs.vm_ip }} \
            "minikube start --driver=docker --force"

      - name: Deploy via Helm on VM
        run: |
          ssh root@${{ github.event.inputs.vm_ip }} \
            "helm upgrade --install myapp-${{ steps.vars.outputs.NAMESPACE }} \
            /root/helm/myapp \
            --namespace ${{ steps.vars.outputs.NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ steps.vars.outputs.TAG }} \
            --set env=${{ steps.vars.outputs.NAMESPACE }} \
            --set namespace=${{ steps.vars.outputs.NAMESPACE }} \
            --set service.nodePort=${{ steps.vars.outputs.NODE_PORT }}"

      - name: Port forward for access
        run: |
          ssh -f root@${{ github.event.inputs.vm_ip }} \
            "nohup kubectl port-forward \
            svc/myapp-${{ steps.vars.outputs.NAMESPACE }} \
            ${{ steps.vars.outputs.HOST_PORT }}:80 \
            -n ${{ steps.vars.outputs.NAMESPACE }} \
            --address=0.0.0.0 > /tmp/pf-${{ steps.vars.outputs.NAMESPACE }}.log 2>&1 &"

      - name: Verify deployment
        run: |
          sleep 15
          ssh root@${{ github.event.inputs.vm_ip }} \
            "kubectl get pods -n ${{ steps.vars.outputs.NAMESPACE }}"

      - name: Print access URL
        run: |
          echo "App available at: http://${{ github.event.inputs.vm_ip }}:${{ steps.vars.outputs.HOST_PORT }}"