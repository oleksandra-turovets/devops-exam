---
- name: Install Kubernetes, Minikube, Helm
  hosts: all
  become: true

  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
          - gnupg
          - conntrack
          - socat
        state: present
        update_cache: true

    - name: Download Docker install script
      ansible.builtin.get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: '0755'

    - name: Install Docker
      ansible.builtin.command: /bin/bash /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker
      changed_when: false

    - name: Start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Download kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Download Minikube
      ansible.builtin.get_url:
        url: "https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64"
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Start Minikube
      ansible.builtin.command: minikube start --driver=docker --force
      args:
        creates: /root/.minikube
      environment:
        HOME: /root
      changed_when: false

    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm.sh
        mode: '0755'

    - name: Install Helm
      ansible.builtin.command: /bin/bash /tmp/get-helm.sh
      args:
        creates: /usr/local/bin/helm
      changed_when: false

    - name: Install kubectl proxy service
      ansible.builtin.copy:
        dest: /etc/systemd/system/kubectl-proxy.service
        mode: '0644'
        content: |
          [Unit]
          Description=Kubectl Proxy
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/kubectl proxy --port=8001 --address=0.0.0.0 --accept-hosts=.*
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Start kubectl proxy
      ansible.builtin.systemd:
        name: kubectl-proxy
        state: started
        enabled: true
        daemon_reload: true

    - name: Verify kubectl
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify Minikube
      ansible.builtin.command: minikube version
      register: minikube_check
      changed_when: false

    - name: Verify Helm
      ansible.builtin.command: helm version
      register: helm_check
      changed_when: false

    - name: Print versions
      ansible.builtin.debug:
        msg:
          - "{{ kubectl_check.stdout }}"
          - "{{ minikube_check.stdout }}"
          - "{{ helm_check.stdout }}"
